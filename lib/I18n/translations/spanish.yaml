STR_README: "ReadMe"
STR_README_APP_DESC: "Guía rápida de funciones clave de vCodex"
STR_README_GITHUB_HINT: "Más detalles en GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalizar Home y Apps"
STR_README_SYNC_DAY_BODY: "Sync Day mantiene las funciones basadas en fecha en el día correcto.\n\nEste dispositivo puede olvidar la fecha real tras entrar en suspensión, así que Sync Day la actualiza por Wi-Fi.\n\nUso simple:\n- configura la zona horaria una vez\n- pulsa Obtener día antes de tu primera sesión de lectura del día\n- Formato de fecha solo cambia cómo se muestra la fecha\n- Mostrar día muestra u oculta la fecha en el encabezado\n- Recordatorio SyncDay avisa tras varios inicios sin sincronización reciente\n\nSi pasas demasiado tiempo sin usar Sync Day, las estadísticas, rachas y logros pueden guardarse en el día equivocado."
STR_README_STATS_BODY: "Reading Stats registra tiempo, sesiones, libros terminados y días de objetivo.\n\nReglas importantes:\n- usa Sync Day si quieres que las funciones por fecha sean correctas\n- una sesión necesita al menos 3 minutos para contar\n\nPantallas útiles:\n- Reading Stats: totales y resumen\n- Reading Heatmap: calendario mensual\n- Reading Day: un día concreto\n- Reading Profile: últimos 7 días\n\nAjustes útiles en Ajustes > Apps > Reading Stats:\n- Objetivo diario cambia la meta usada por rachas y logros\n- Mostrar después de leer abre el resumen tras una sesión contabilizada\n- Exportar / Importar / Restablecer permiten gestionar el archivo de estadísticas\n\nOpcional: los libros dentro de /ignore_stats/ se ignoran en el sistema de estadísticas."
STR_README_PROFILE_BODY: "Reading Profile es una foto de tus hábitos de lectura de los últimos 7 días.\n\nPuntúa cuatro ejes:\n- Hábito: con qué frecuencia lees y cumples tu objetivo diario\n- Estabilidad: cómo se reparte la lectura durante la semana\n- Compromiso: con qué frecuencia vuelves para otra sesión\n- Profundidad: si tus sesiones son sobre todo cortas, medias o largas\n\nLa puntuación total es solo un resumen. Los cuatro ejes son lo que realmente explica tu patrón."
STR_README_BOOKMARKS_BODY: "Mientras hay un libro abierto:\n- Si mantienes pulsado OK inferior, la página actual se guarda como marcador.\n- Si pulsas rápido el mismo botón, se abre un menú para revisar marcadores rápidamente.\n- Para eliminar un marcador, mantén pulsado otra vez el mismo botón mientras el marcador esté seleccionado."
STR_README_FAVORITES_BODY: "Favoritos permite fijar libros a los que quieres acceder rápido.\n\nCómo funciona:\n- abre Favoritos > Explorar archivos\n- muévete por carpetas como en un explorador normal\n- cada libro puede marcarse o desmarcarse con la casilla de la derecha\n\nGestionar favoritos:\n- Favoritos > Ordenar favoritos permite elegir manualmente qué libros aparecen primero\n- mantén Selecc. sobre un favorito si quieres quitarlo y confirma\n- no hay un límite fijo de favoritos"
STR_README_FLASHCARDS_BODY: "Flashcards estudia mazos CSV guardados en la tarjeta SD.\n\nSecciones principales:\n- Abrir carga un mazo desde el almacenamiento\n- Recientes reabre mazos usados recientemente\n- Estadísticas lista mazos conocidos y su progreso\n- Ajustes permite elegir modo de estudio y tamaño de sesión\n\nModos de estudio:\n- Pendientes crea una sesión finita con cartas pendientes primero y cartas nuevas después\n- Programado crea una sesión finita y mezclada con todo el mazo\n- Infinito ignora el tamaño de sesión y sigue hasta que salgas manualmente\n- Secuencial usa todas las cartas en orden CSV y termina tras la última\n\nCómo funcionan las opciones:\n- Modo de estudio decide qué cartas entran en la sesión\n- Tamaño de sesión decide cuántas de esas cartas se usan\n- Si Tamaño de sesión es Todo, Pendientes usa todas las pendientes más las nuevas, y Programado usa todo el mazo\n- Infinito y Secuencial ignoran el tamaño de sesión\n\nDurante el repaso:\n- Girar cambia entre cara A y cara B\n- Siguiente salta la carta actual sin puntuarla\n- Acierto marca la carta como correcta\n- Fallo marca la carta como fallada y la adelanta\n\nSi mantienes Selecc. sobre un mazo en Estadísticas, puedes borrar sus estadísticas tras confirmar."
STR_README_SLEEP_BODY: "Sleep permite elegir qué muestra el dispositivo mientras duerme.\n\nPuedes:\n- elegir un directorio de suspensión\n- previsualizar imágenes\n- elegir orden aleatorio o secuencial\n- usar carpetas cuyo nombre empiece por sleep_, como sleep_books o sleep_manga\n\nSi quieres distintos estilos, crea más carpetas sleep_ y cambia entre ellas."
STR_README_SHORTCUTS_BODY: "En Ajustes > Apps > Accesos directos puedes organizar Home y Apps.\n\nPuedes:\n- decidir si cada app pertenece a Home o Apps\n- mostrar u ocultar cada acceso\n- cambiar el orden de los elementos en ambas pantallas\n\nEs la forma más sencilla de mantener el lanzador limpio."
STR_README_SETTINGS_BODY: "Algunos ajustes merecen una explicación rápida:\n\nLector\n- Suavizado de texto suaviza la letra, pero puede costar algo de velocidad\n- Oscuridad del texto cambia lo oscuro que se ve el texto\n- Modo de refresco del lector cambia el estilo de refresco; Auto es el valor seguro\n- La tipografía y el tamaño suelen importar más que el tema visual para leer cómodo\n\nApps\n- Mostrar día muestra u oculta la fecha en el encabezado\n- Formato de fecha solo cambia cómo se muestra la fecha\n- Objetivo diario afecta a rachas, estadísticas y logros\n- Mostrar después de leer abre Reading Stats tras una sesión contabilizada\n- Activar logros enciende o apaga el sistema de logros\n- Avisos de logros solo controla los popups de desbloqueo\n\nPantalla\n- Interfaz solo cambia el aspecto de la UI"
STR_README_ACHIEVEMENTS_BODY: "Los logros premian hitos como rachas de objetivo, tiempo de lectura, libros terminados y marcadores.\n\nPara mantenerlos correctos, usa Sync Day con regularidad, porque los logros dependen del mismo modelo diario que Reading Stats.\n\nAjustes útiles en Ajustes > Apps > Logros:\n- Activar logros enciende o apaga el sistema\n- Avisos de logros decide si se muestran popups de desbloqueo\n- Sincronizar con estadísticas previas reconstruye el progreso desde tus estadísticas existentes\n\nEl objetivo diario también importa, porque muchos logros dependen de días y rachas de objetivo."
STR_README_IF_FOUND_BODY: "Una app que ayuda a devolver el dispositivo si se pierde.\n\nEscribir en este dispositivo es incómodo, así que si añades un archivo llamado if_found.txt a la tarjeta SD, su contenido se mostrará al abrir esta app.\n\nPuedes escribir lo que quieras ahí: una frase, un teléfono, un email..."
