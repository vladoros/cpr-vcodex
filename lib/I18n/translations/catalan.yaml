STR_README_TOPIC_SHORTCUTS: "Personalitza Inici i Apps"
STR_README_SYNC_DAY_BODY: "Sync Day manté les funcions basades en data al dia correcte.\n\nAquest dispositiu pot oblidar la data real després del repòs, així que Sync Day l'actualitza per Wi-Fi.\n\nÚs simple:\n- configura la zona horària una vegada\n- prem Sincronitza ara abans de la primera sessió de lectura del dia\n- Format de data només canvia com es mostra la data\n- Dia mostrat mostra o amaga la data a la capçalera\n- Recordatori SyncDay avisa després de diversos inicis sense una sincronització recent\n\nSi passes massa temps sense usar Sync Day, les estadístiques, ratxes i assoliments poden desar-se al dia equivocat."
STR_README_STATS_BODY: "Reading Stats registra temps, sessions, llibres acabats i dies d'objectiu.\n\nRegles importants:\n- usa Sync Day si vols que les funcions per data siguin correctes\n- una sessió necessita almenys 3 minuts per comptar\n\nPantalles útils:\n- Reading Stats: totals i resum\n- Reading Heatmap: calendari mensual\n- Reading Day: un dia concret\n- Reading Profile: darrers 7 dies\n\nAjustos útils a Configuració > Apps > Reading Stats:\n- Objectiu diari canvia l'objectiu usat per ratxes i assoliments\n- Mostra després de llegir obre el resum després d'una sessió comptabilitzada\n- Exporta / Importa / Restableix permeten gestionar el fitxer d'estadístiques\n\nOpcional: els llibres dins de /ignore_stats/ s'ignoren al sistema d'estadístiques."
STR_README_PROFILE_BODY: "Reading Profile és una instantània dels hàbits de lectura dels darrers 7 dies.\n\nPuntua quatre eixos:\n- Hàbit: amb quina freqüència llegeixes i assoleixes l'objectiu diari\n- Estabilitat: com es reparteix la lectura durant la setmana\n- Compromís: amb quina freqüència tornes per a una altra sessió\n- Profunditat: si les sessions són sobretot curtes, mitjanes o llargues\n\nLa puntuació total només és un resum. Els quatre eixos són el que realment explica el teu patró."
STR_README_BOOKMARKS_BODY: "Mentre hi ha un llibre obert:\n- Si mantens premuda la tecla OK inferior, la pàgina actual es desa com a punt de llibre.\n- Si prems ràpidament la mateixa tecla, s'obre un menú per revisar punts de llibre ràpidament.\n- Per suprimir un punt de llibre, mantén premuda una altra vegada la mateixa tecla mentre el punt està seleccionat."
STR_README_FAVORITES_BODY: "Preferits et permet fixar llibres als quals vols accedir ràpidament.\n\nCom funciona:\n- obre Preferits > Explora fitxers\n- mou-te per les carpetes com en un explorador normal\n- cada llibre es pot marcar o desmarcar amb la casella de la dreta\n\nGestió de preferits:\n- Preferits > Ordena els preferits permet triar manualment quins llibres apareixen primer\n- mantén Selecc. sobre un preferit si vols treure'l i confirma\n- no hi ha cap límit fix de preferits"
STR_README_FLASHCARDS_BODY: "Flashcards estudia baralles CSV desades a la targeta SD.\n\nSeccions principals:\n- Obre carrega una baralla des de l'emmagatzematge\n- Recents reobre baralles usades recentment\n- Estadístiques llista baralles conegudes i el seu progrés\n- Configuració permet triar el mode d'estudi i la mida de sessió\n\nModes d'estudi:\n- Pendents crea una sessió finita amb targetes pendents primer i targetes noves després\n- Programat crea una sessió finita i barrejada amb tota la baralla\n- Infinit ignora la mida de sessió i continua fins que surts manualment\n\nCom funcionen les opcions:\n- Modalitat d'estudi decideix quines targetes entren a la sessió\n- Mida de la sessió decideix quantes d'aquestes targetes s'usen\n- Si Mida de la sessió és Tots, Pendents usa totes les pendents més les noves, i Programat usa tota la baralla\n\nDurant la revisió:\n- Gira canvia entre davant i revers\n- Següent salta la targeta actual sense puntuar-la\n- Èxit marca la targeta com a correcta\n- Error marca la targeta com a fallada i la fa tornar abans\n\nSi mantens Selecc. sobre una baralla dins d'Estadístiques, pots esborrar-ne les estadístiques després de confirmar."
STR_README_SLEEP_BODY: "Sleep permet triar què mostra el dispositiu mentre dorm.\n\nPots:\n- triar un directori de repòs\n- previsualitzar imatges\n- triar ordre aleatori o seqüencial\n- usar carpetes amb noms que comencin per sleep_, com sleep_books o sleep_manga\n\nSi vols estils diferents, crea més carpetes sleep_ i canvia entre elles."
STR_README_SHORTCUTS_BODY: "A Configuració > Apps > Dreceres pots organitzar Inici i Apps.\n\nPots:\n- decidir si cada app pertany a Inici o Apps\n- mostrar o amagar cada drecera\n- canviar l'ordre dels elements a totes dues pantalles\n\nÉs la manera més senzilla de mantenir el llançador net."
STR_README_SETTINGS_BODY: "Alguns ajustos mereixen una explicació ràpida:\n\nLector\n- Antialiàsing del text suavitza la lletra, però pot costar una mica de velocitat\n- Foscor del text canvia com de fosc es veu el text\n- Mode d'actualització del lector canvia l'estil de refresc; Automàtic és el valor segur\n- El tipus i la mida de lletra solen importar més que el tema visual per llegir còmodament\n\nApps\n- Dia mostrat mostra o amaga la data a la capçalera\n- Format de data només canvia com es mostra la data\n- Objectiu diari afecta ratxes, estadístiques i assoliments\n- Mostra després de llegir obre Reading Stats després d'una sessió comptabilitzada\n- Activa els assoliments activa o desactiva el sistema d'assoliments\n- Avisos d'assoliments només controla els avisos de desbloqueig\n\nPantalla\n- Tema de la interfície només canvia l'aspecte de la UI"
STR_README_ACHIEVEMENTS_BODY: "Els assoliments premien fites com ratxes d'objectiu, temps de lectura, llibres acabats i punts de llibre.\n\nPer mantenir-los correctes, usa Sync Day regularment, perquè els assoliments depenen del mateix model diari que Reading Stats.\n\nAjustos útils a Configuració > Apps > Assoliments:\n- Activa els assoliments activa o desactiva el sistema\n- Avisos d'assoliments decideix si es mostren avisos de desbloqueig\n- Sincronitza amb les estadístiques anteriors reconstrueix el progrés des de les estadístiques existents\n\nL'objectiu diari també importa, perquè molts assoliments depenen dels dies i les ratxes d'objectiu."
STR_README_IF_FOUND_BODY: "Una app que ajuda a retornar el dispositiu si es perd.\n\nEscriure en aquest dispositiu és incòmode, així que si afegeixes un fitxer anomenat if_found.txt a la targeta SD, el seu contingut es mostrarà en obrir aquesta app.\n\nHi pots escriure el que vulguis: una frase, un telèfon, un correu..."
